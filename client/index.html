<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtAround - Gateway</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Playpen+Sans:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 1. RESET E SETUP FONT */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Fredoka', sans-serif; }

        body.admin-layout {
            background: linear-gradient(135deg, #f5faf5 0%, #e4f0e5 45%, #cfe5d2 75%, #c2ddc7 100%);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .gateway-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 900px;
        }

        .login-section {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px 40px;
            width: 100%;
            max-width: 380px; 
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(80, 140, 100, 0.12);
            text-align: center;
        }

        .gateway-title {
            font-family: 'Playpen Sans', sans-serif;
            font-weight: 700; color: #2d5a3d; font-size: 1.8rem; margin-bottom: 8px;
        }

        .login-form { display: flex; flex-direction: column; gap: 15px; max-width: 260px; margin: 20px auto 0; }

        .login-form input {
            width: 100%; padding: 16px 25px; border-radius: 50px; 
            background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(80, 140, 100, 0.15);
            color: #2d5a3d; font-size: 1rem; text-align: center; outline: none; transition: 0.3s;
        }

        .login-form .btn-primary-glass {
            width: 100%; padding: 16px 25px; border-radius: 50px;
            background: #2d5a3d; color: white; border: none; font-weight: 700;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }

        .area-selection { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; transition: 0.5s; }

        .area-card {
            background: rgba(255, 255, 255, 0.55); backdrop-filter: blur(10px); border-radius: 25px;
            padding: 20px; height: 160px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-decoration: none; border: 2px solid transparent;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .area-card .label { font-family: 'Playpen Sans', sans-serif !important; font-weight: 700; color: #2d5a3d; }

        .locked { opacity: 0.3; pointer-events: none; filter: grayscale(1) blur(2px); }
    </style>
</head>
<body class="admin-layout">
    <div class="gateway-container">
        <section class="login-section">
            <h2 class="gateway-title">Benvenuto!</h2>
            <form class="login-form">
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
                <button type="button" class="btn-primary-glass" onclick="unlockAreas()">Accedi</button>
            </form>
        </section>

        <section class="area-selection locked" id="areaGrid">
           <a href="menu_editor.html" class="nav-card area-card">
                <i class="fa-solid fa-pen-to-square" style="font-size: 2rem; color: #3a7a52;"></i>
                <span class="label">Marketplace</span>
            </a>
            <a href="#" class="nav-card area-card" onclick="alert('Navigator in arrivo')">
                <i class="fa-solid fa-compass" style="font-size: 2rem; color: #3a7a52;"></i>
                <span class="label">Navigator</span>
            </a>
            <a href="#" class="nav-card area-card" onclick="alert('Backoffice in arrivo')">
                <i class="fa-solid fa-gear" style="font-size: 2rem; color: #3a7a52;"></i>
                <span class="label">Backoffice</span>
            </a>
        </section>
    </div>

    <script>
        function unlockAreas() {
            const grid = document.getElementById('areaGrid');
            grid.classList.remove('locked');
            const btn = document.querySelector('.btn-primary-glass');
            btn.innerHTML = 'Sbloccato!';
        }
    </script>
</body>
</html>
